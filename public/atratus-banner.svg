<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 340" width="1280" height="340" role="img" aria-label="Atratus - ML trading signals">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#05080f"/>
      <stop offset="0.5" stop-color="#081320"/>
      <stop offset="1" stop-color="#060d15"/>
    </linearGradient>
    <radialGradient id="glowField" cx="0.28" cy="0.42" r="0.75">
      <stop offset="0" stop-color="#0e3a44" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#0e3a44" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="neon" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#19e6d6"/>
      <stop offset="0.5" stop-color="#2dffa6"/>
      <stop offset="1" stop-color="#19c2e6"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#16d8c8"/>
      <stop offset="1" stop-color="#2dffa6"/>
    </linearGradient>
    <linearGradient id="area" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1ee6c4" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#1ee6c4" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="scrim" cx="0.5" cy="0.5" r="0.6">
      <stop offset="0" stop-color="#04060c" stop-opacity="0.92"/>
      <stop offset="1" stop-color="#04060c" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="hot" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="10" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#1ee6c4" stroke-opacity="0.06" stroke-width="1"/>
    </pattern>
    <pattern id="scan" width="4" height="4" patternUnits="userSpaceOnUse">
      <rect width="4" height="1" fill="#9ffff0" opacity="0.035"/>
    </pattern>
  </defs>

  <rect width="1280" height="340" fill="url(#bg)"/>
  <rect width="1280" height="340" fill="url(#glowField)"/>
  <rect width="1280" height="340" fill="url(#grid)"/>

  <g stroke="#1ee6c4" stroke-opacity="0.16" stroke-width="1">
    <path d="M150 70 L300 50 M150 70 L300 110 M150 70 L300 170 M150 130 L300 50 M150 130 L300 110 M150 130 L300 170 M150 190 L300 110 M150 190 L300 170"/>
    <path d="M300 50 L450 80 M300 110 L450 80 M300 110 L450 150 M300 170 L450 150 M300 50 L450 150 M300 170 L450 80"/>
  </g>
  <g fill="#2dffa6">
    <circle cx="150" cy="70" r="4" opacity="0.9"/><circle cx="150" cy="130" r="4" opacity="0.7"/><circle cx="150" cy="190" r="4" opacity="0.55"/>
    <circle cx="300" cy="50" r="4" opacity="0.85"/><circle cx="300" cy="110" r="4" opacity="0.95"/><circle cx="300" cy="170" r="4" opacity="0.7"/>
    <circle cx="450" cy="80" r="4.5" opacity="0.9"/><circle cx="450" cy="150" r="4.5" opacity="0.8"/>
  </g>

  <path d="M40 290 C 140 270 200 300 300 252 S 460 212 560 234 S 760 154 880 182 S 1080 112 1240 142 L 1240 320 L 40 320 Z" fill="url(#area)"/>
  <path d="M40 290 C 140 270 200 300 300 252 S 460 212 560 234 S 760 154 880 182 S 1080 112 1240 142"
        fill="none" stroke="url(#line)" stroke-width="3.5" stroke-linecap="round" filter="url(#soft)"/>

  <g stroke-width="2.4">
    <g stroke="#2dffa6"><line x1="120" y1="248" x2="120" y2="292"/><rect x="113" y="258" width="14" height="27" fill="#2dffa6" rx="1"/></g>
    <g stroke="#ff3b6b"><line x1="260" y1="242" x2="260" y2="280"/><rect x="253" y="250" width="14" height="22" fill="#ff3b6b" rx="1"/></g>
    <g stroke="#2dffa6"><line x1="420" y1="220" x2="420" y2="268"/><rect x="413" y="228" width="14" height="30" fill="#2dffa6" rx="1"/></g>
    <g stroke="#2dffa6"><line x1="620" y1="202" x2="620" y2="248"/><rect x="613" y="210" width="14" height="28" fill="#2dffa6" rx="1"/></g>
    <g stroke="#ff3b6b"><line x1="780" y1="190" x2="780" y2="230"/><rect x="773" y="198" width="14" height="22" fill="#ff3b6b" rx="1"/></g>
    <g stroke="#2dffa6"><line x1="960" y1="150" x2="960" y2="198"/><rect x="953" y="158" width="14" height="30" fill="#2dffa6" rx="1"/></g>
    <g stroke="#2dffa6" filter="url(#soft)"><line x1="1120" y1="130" x2="1120" y2="178"/><rect x="1113" y="138" width="14" height="30" fill="#2dffa6" rx="1"/></g>
  </g>

  <rect width="1280" height="340" fill="url(#scan)"/>

  <ellipse cx="700" cy="170" rx="560" ry="150" fill="url(#scrim)"/>

  <g font-family="'JetBrains Mono','Consolas',monospace" font-size="13" letter-spacing="3">
    <circle cx="52" cy="40" r="4" fill="#2dffa6" filter="url(#soft)"/>
    <text x="66" y="45" fill="#7fe9dc" opacity="0.85">SIGNAL ENGINE / LIVE</text>
    <text x="1240" y="45" text-anchor="end" fill="#5f8493" letter-spacing="2">CATBOOST - LSTM - TRANSFORMER - TCN</text>
  </g>

  <g font-family="'Bahnschrift','DIN Condensed','Oswald','Arial Narrow',sans-serif" font-weight="800">
    <text x="640" y="200" text-anchor="middle" font-size="132" letter-spacing="6"
          fill="url(#neon)" filter="url(#hot)">ATRATUS</text>
    <text x="640" y="200" text-anchor="middle" font-size="132" letter-spacing="6"
          fill="#eafffb">ATRATUS</text>
  </g>

  <text x="640" y="246" text-anchor="middle" font-family="'JetBrains Mono','Consolas',monospace"
        font-size="15" letter-spacing="6" fill="#8fd9cf" opacity="0.92">ML TRADING SIGNALS  -  208 ASSETS  -  4-MODEL ENSEMBLE</text>

  <rect x="10" y="10" width="1260" height="320" fill="none" stroke="#1ee6c4" stroke-opacity="0.18" rx="6"/>
  <g stroke="#2dffa6" stroke-width="2" stroke-opacity="0.8">
    <path d="M10 34 V10 H34" fill="none"/><path d="M1246 10 H1270 V34" fill="none"/>
    <path d="M10 306 V330 H34" fill="none"/><path d="M1246 330 H1270 V306" fill="none"/>
  </g>
</svg>
